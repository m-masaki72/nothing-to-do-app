<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- background -->
  <rect width="1200" height="630" fill="#1a1a1a"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#222" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#222" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#222" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#222" stroke-width="1"/>

  <!-- flame emojis -->
  <text x="80"  y="180" font-size="72" opacity="0.18">🔥</text>
  <text x="200" y="520" font-size="56" opacity="0.12">🔥</text>
  <text x="980" y="200" font-size="64" opacity="0.15">🔥</text>
  <text x="1080" y="480" font-size="80" opacity="0.10">🔥</text>
  <text x="500" y="100" font-size="48" opacity="0.10">🔥</text>

  <!-- brand mark -->
  <rect x="60" y="60" width="56" height="56" rx="10" fill="#fff"/>
  <text x="88" y="97" font-family="Helvetica Neue,Arial,sans-serif" font-size="36" font-weight="900" fill="#1a1a1a" text-anchor="middle">N</text>

  <!-- main headline -->
  <text x="600" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">THERE IS NOTHING TO DO.</text>
  <text x="600" y="330" font-family="Helvetica Neue,Arial,sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">DO IT NOW.</text>

  <!-- sub copy -->
  <text x="600" y="420" font-family="Helvetica Neue,Arial,sans-serif" font-size="26" font-weight="400" fill="#555" text-anchor="middle" letter-spacing="1">先延ばしを許さないタスク管理アプリ</text>

  <!-- url -->
  <text x="600" y="565" font-family="Helvetica Neue,Arial,sans-serif" font-size="20" font-weight="400" fill="#444" text-anchor="middle" letter-spacing="1">nothing-to-do-app.pages.dev</text>

  <!-- bottom accent line -->
  <rect x="480" y="585" width="240" height="2" rx="1" fill="#333"/>
</svg>
