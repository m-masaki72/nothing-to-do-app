name: Deploy to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/436267975538/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@nothing-to-do-app-2026.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=us-central1-docker.pkg.dev/nothing-to-do-app-2026/cloud-run-source-deploy/nothing-to-do-api:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nothing-to-do-api \
            --image "$IMAGE" \
            --project nothing-to-do-app-2026 \
            --region us-central1 \
            --allow-unauthenticated \
            --quiet \
            --set-env-vars "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},CLIENT_ORIGIN=https://nothing-to-do-app.pages.dev"
